name: Lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  swiftlint:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint --strict --baseline .swiftlint.baseline
